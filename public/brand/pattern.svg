<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!--
    Фирменный паттерн МАБЛ — бесшовная ромбическая решётка (Океан).
    Тайл 64×64 строго периодичен: рёбра ромба совпадают со сторонами
    соседних плиток, поэтому стыкуется без швов при любом масштабе.
  -->
  <g fill="none" stroke="#3552AF" stroke-width="1.1">
    <!-- основной ромб: вершины в серединах сторон плитки -->
    <path d="M32 0 L64 32 L32 64 L0 32 Z" />
    <!-- концентрический внутренний ромб -->
    <path d="M32 12 L52 32 L32 52 L12 32 Z" opacity="0.7" />
    <!-- ромбы по углам (формируют чередование «ромб/поле») -->
    <path d="M0 0 L16 0 L0 16 Z" opacity="0.7" />
    <path d="M64 0 L48 0 L64 16 Z" opacity="0.7" />
    <path d="M0 64 L16 64 L0 48 Z" opacity="0.7" />
    <path d="M64 64 L48 64 L64 48 Z" opacity="0.7" />
  </g>
  <!-- узловые точки решётки -->
  <g fill="#3552AF">
    <circle cx="32" cy="32" r="1.6" />
    <circle cx="0" cy="0" r="1.4" />
    <circle cx="64" cy="0" r="1.4" />
    <circle cx="0" cy="64" r="1.4" />
    <circle cx="64" cy="64" r="1.4" />
  </g>
</svg>
